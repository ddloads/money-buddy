version: "3.9"

# ─── Money Buddy ─────────────────────────────────────────────────────────────
# Portainer stack deployment
# Set these env vars in Portainer → Stack → Environment variables:
#   SECRET_KEY, POSTGRES_PASSWORD, GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET
# Optional external SMTP override:
#   SMTP_HOST, SMTP_PORT, SMTP_USER, SMTP_PASSWORD, SMTP_FROM_EMAIL, SMTP_TLS
#
# Default SMTP points at the shared Portainer stack `shared-smtp-relay` on the
# external Docker network `smtp-relay-net`. Provider credentials are managed in
# that standalone stack, not inside Money Buddy.
# ─────────────────────────────────────────────────────────────────────────────

x-backend-environment: &backend-environment
  DATABASE_URL: postgresql+asyncpg://moneybuddy:${POSTGRES_PASSWORD:-changeme123}@db:5432/moneybuddy
  SECRET_KEY: ${SECRET_KEY:-please-change-this-secret-key-in-production}
  ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
  ALGORITHM: HS256
  GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
  GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
  GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-http://localhost/api/auth/google/callback}
  SMTP_HOST: ${SMTP_HOST:-shared-smtp-relay}
  SMTP_PORT: ${SMTP_PORT:-25}
  SMTP_USER: ${SMTP_USER:-}
  SMTP_PASSWORD: ${SMTP_PASSWORD:-}
  SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-moneybuddy@mb.ddsplayground.com}
  SMTP_FROM_NAME: ${SMTP_FROM_NAME:-Money Buddy}
  SMTP_TLS: ${SMTP_TLS:-false}
  APP_NAME: Money Buddy
  FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
  UPLOAD_DIR: /uploads
  MAX_UPLOAD_SIZE_MB: 10
  REMINDER_DAYS_BEFORE: ${REMINDER_DAYS_BEFORE:-3}
  CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost,http://localhost:3000}

services:

  # ── PostgreSQL Database ──────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: moneybuddy
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme123}
      POSTGRES_DB: moneybuddy
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U moneybuddy"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - money-buddy-net

  # ── FastAPI Backend ──────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment: *backend-environment
    volumes:
      - uploads:/uploads
    networks:
      - money-buddy-net
      - smtp-relay-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health', timeout=5).status==200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ── Daily reminder worker ────────────────────────────────────────────────
  reminder-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment: *backend-environment
    volumes:
      - uploads:/uploads
    networks:
      - money-buddy-net
      - smtp-relay-net
    command: >
      sh -c 'while true; do
        python -c "import asyncio; from app.services.reminders import check_and_send_reminders; print(asyncio.run(check_and_send_reminders()), flush=True)";
        sleep $${REMINDER_INTERVAL_SECONDS:-86400};
      done'

  # ── React Frontend (nginx) ───────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3107:80"
    networks:
      - money-buddy-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
    driver: local
  uploads:
    driver: local

networks:
  money-buddy-net:
    driver: bridge
  smtp-relay-net:
    external: true
    name: smtp-relay-net
