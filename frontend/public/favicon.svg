<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="w" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <linearGradient id="c" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <circle cx="16" cy="16" r="16" fill="url(#bg)"/>
  <!-- Wallet body -->
  <rect x="4" y="9" width="21" height="15" rx="3" fill="url(#w)"/>
  <!-- Coin pocket -->
  <rect x="19" y="12" width="8" height="9" rx="2" fill="#047857"/>
  <!-- Coin -->
  <circle cx="23" cy="16.5" r="3.5" fill="url(#c)"/>
  <!-- Eyes on wallet -->
  <circle cx="10" cy="14" r="1.5" fill="#065f46"/>
  <circle cx="14.5" cy="14" r="1.5" fill="#065f46"/>
  <!-- Smile -->
  <path d="M 8.5 17.5 Q 12 20 15.5 17.5" stroke="#065f46" stroke-width="1.2" fill="none" stroke-linecap="round"/>
</svg>