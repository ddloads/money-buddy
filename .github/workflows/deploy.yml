name: Deploy to Portainer

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Portainer git redeploy via webhook
        run: |
          STATUS=$(curl -s -o /tmp/resp.json -w "%{http_code}" -X POST \
            "${{ secrets.PORTAINER_WEBHOOK_URL }}")
          echo "Webhook status: $STATUS"
          cat /tmp/resp.json || true
          [ "$STATUS" = "200" ] || [ "$STATUS" = "204" ] || exit 1
          echo "Redeploy triggered"
