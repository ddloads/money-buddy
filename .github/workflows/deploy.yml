name: Deploy to Portainer

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Redeploy stack with current commit hash
        env:
          PORTAINER_URL: https://portainer.ddsplayground.com
          PORTAINER_TOKEN: ${{ secrets.PORTAINER_TOKEN }}
          STACK_ID: 48
          ENDPOINT_ID: 3
          GIT_COMMIT: ${{ github.sha }}
        run: |
          if [ -z "$PORTAINER_TOKEN" ]; then
            echo "ERROR: PORTAINER_TOKEN secret is not set."
            echo "Add it at: github.com/ddloads/money-buddy/settings/secrets/actions"
            exit 1
          fi

          STACK=$(curl -sf -H "X-API-Key: $PORTAINER_TOKEN" "$PORTAINER_URL/api/stacks/$STACK_ID")

          UPDATED_ENV=$(echo "$STACK" | python3 -c "import sys,json,os;s=json.load(sys.stdin);e=s.get('Env',[]);e=[x for x in e if x['name']!='GIT_COMMIT'];e.append({'name':'GIT_COMMIT','value':os.environ['GIT_COMMIT']});print(json.dumps(e))")

          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            -H "X-API-Key: $PORTAINER_TOKEN" \
            -H "Content-Type: application/json" \
            "$PORTAINER_URL/api/stacks/$STACK_ID/git/redeploy?endpointId=$ENDPOINT_ID" \
            -d "{\"env\": $UPDATED_ENV, \"pullImage\": true, \"prune\": false}")

          echo "Portainer redeploy status: $HTTP_STATUS"
          [ "$HTTP_STATUS" = "200" ] || exit 1
