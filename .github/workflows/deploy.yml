name: Deploy to Portainer

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Redeploy stack with current commit hash
        env:
          PORTAINER_URL: https://portainer.ddsplayground.com
          PORTAINER_TOKEN: ${{ secrets.PORTAINER_TOKEN }}
          STACK_ID: 48
          ENDPOINT_ID: 3
          GIT_COMMIT: ${{ github.sha }}
        run: |
          set -e

          # 1. Fetch current env vars
          STACK=$(curl -sf -H "X-API-Key: $PORTAINER_TOKEN" \
            "$PORTAINER_URL/api/stacks/$STACK_ID")

          # 2. Merge GIT_COMMIT into env array
          UPDATED_ENV=$(echo "$STACK" | python3 -c "import sys,json,os;s=json.load(sys.stdin);e=s.get('Env',[]);e=[x for x in e if x['name']!='GIT_COMMIT'];e.append({'name':'GIT_COMMIT','value':os.environ['GIT_COMMIT']});print(json.dumps(e))")

          # 3. Persist updated env vars to Portainer (no redeploy yet)
          PUT_STATUS=$(curl -s -o /tmp/put_resp.json -w "%{http_code}" -X PUT \
            -H "X-API-Key: $PORTAINER_TOKEN" \
            -H "Content-Type: application/json" \
            "$PORTAINER_URL/api/stacks/$STACK_ID?endpointId=$ENDPOINT_ID" \
            -d "{\"env\": $UPDATED_ENV, \"prune\": false, \"pullImage\": false}")
          echo "PUT env vars → HTTP $PUT_STATUS"
          cat /tmp/put_resp.json
          [ "$PUT_STATUS" = "200" ] || { echo "ERROR: env var update failed"; exit 1; }

          # 4. Get or create a webhook for this stack
          WEBHOOK=$(curl -s -X POST \
            -H "X-API-Key: $PORTAINER_TOKEN" \
            "$PORTAINER_URL/api/stacks/$STACK_ID/webhook")
          echo "Webhook response: $WEBHOOK"

          WEBHOOK_TOKEN=$(echo "$WEBHOOK" | python3 -c "import sys,json;d=json.load(sys.stdin);url=d.get('webhookURL','');print(url.split('/')[-1] if url else d.get('token',''))" 2>/dev/null || true)
          echo "Webhook token: $WEBHOOK_TOKEN"

          if [ -z "$WEBHOOK_TOKEN" ]; then
            echo "ERROR: could not retrieve webhook token from Portainer"
            exit 1
          fi

          # 5. Trigger git pull + redeploy via webhook (no auth required)
          TRIGGER_STATUS=$(curl -s -o /tmp/trigger_resp.json -w "%{http_code}" -X POST \
            "$PORTAINER_URL/api/stacks/webhooks/$WEBHOOK_TOKEN")
          echo "Webhook trigger → HTTP $TRIGGER_STATUS"
          cat /tmp/trigger_resp.json
          [ "$TRIGGER_STATUS" = "200" ] || [ "$TRIGGER_STATUS" = "204" ] || exit 1

          echo "Deploy triggered successfully"
