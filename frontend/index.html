<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Money Buddy - Smart Bill Management" />
    <meta name="theme-color" content="#111827" id="theme-color" />
    <title>💰 Money Buddy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <!-- Anti-flash: apply saved theme before first paint -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('mb_auth')
          var dark = true // default dark
          if (stored) {
            var parsed = JSON.parse(stored)
            if (parsed && parsed.state && typeof parsed.state.darkMode === 'boolean') {
              dark = parsed.state.darkMode
            }
          }
          if (dark) {
            document.documentElement.classList.add('dark')
            var tc = document.getElementById('theme-color')
            if (tc) tc.content = '#111827'
          } else {
            document.documentElement.classList.remove('dark')
            var tc = document.getElementById('theme-color')
            if (tc) tc.content = '#059669'
          }
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
